name: Sync Strava Data

on:
  schedule:
    # Elke dag om 06:00 UTC (08:00 NL tijd)
    - cron: '0 6 * * *'
  workflow_dispatch: # Handmatig triggeren mogelijk

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/sync_strava.py

      - name: Commit & push if changed
        run: |
          git config user.name "Strava Sync Bot"
          git config user.email "actions@github.com"
          git add data/activities.json
          git diff --cached --quiet || (git commit -m "chore: sync strava data $(date -u +%Y-%m-%d)" && git push)
